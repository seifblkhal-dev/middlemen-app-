<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الوسطاء الموثوقين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شريط التحكم العلوي -->
    <nav class="top-nav">
        <div class="nav-container">
            <button id="themeToggle" class="nav-btn">🌙</button>
            <button id="langToggle" class="nav-btn">English</button>
        </div>
    </nav>

    <header>
        <div class="logo-area">
            <h1 data-ar="دليل الوسطاء الموثوقين" data-en="Trusted Middlemen Directory">دليل الوسطاء الموثوقين</h1>
            <p data-ar="تأكد من هوية الوسيط عبر الصور والبيانات الرسمية" data-en="Verify identity via official photos and data">تأكد من هوية الوسيط عبر الصور والبيانات الرسمية</p>
        </div>
    </header>

    <main class="card-grid">
        <!-- كارت الوسيط الأول -->
        <div class="card">
            <div class="profile-frame">
                <img src="seif.jpg" alt="Seif Din">
            </div>
            <div class="badge">
                <span data-ar="وسيط موثوق" data-en="Trusted Middleman">وسيط موثوق</span>
            </div>
            <h2>Seif Din Blkhal</h2>
            <p class="desc" data-ar="مطور النظام ووسيط معتمد - ضمان وأمان." data-en="System developer & certified middleman.">مطور النظام ووسيط معتمد - ضمان وأمان.</p>
            <div class="actions">
                <button class="btn primary" data-ar="بيانات الدفع" data-en="Payment Info">بيانات الدفع</button>
                <button class="btn secondary" data-ar="الملف الشخصي" data-en="Profile">الملف الشخصي</button>
            </div>
        </div>

        <!-- كارت الوسيط الثاني -->
        <div class="card">
            <div class="profile-frame">
                <img src="fahd.jpg" alt="Fahd">
            </div>
            <div class="badge">
                <span data-ar="وسيط موثوق" data-en="Trusted Middleman">وسيط موثوق</span>
            </div>
            <h2>Fahd L-y</h2>
            <p class="desc" data-ar="وسيط موثوق لضمان حقوق الأطراف." data-en="Trusted middleman for party rights.">وسيط موثوق لضمان حقوق الأطراف.</p>
            <div class="actions">
                <button class="btn primary" data-ar="بيانات الدفع" data-en="Payment Info">بيانات الدفع</button>
                <button class="btn secondary" data-ar="الملف الشخصي" data-en="Profile">الملف الشخصي</button>
            </div>
        </div>

        <!-- كارت الوسيط الثالث -->
        <div class="card">
            <div class="profile-frame">
                <img src="abdallah.jpg" alt="Abdallah">
            </div>
            <div class="badge">
                <span data-ar="وسيط موثوق" data-en="Trusted Middleman">وسيط موثوق</span>
            </div>
            <h2>Abdallah Bendal</h2>
            <p class="desc" data-ar="وسيط معتمد لخدمات الألعاب والتحويلات." data-en="Certified for gaming and transfers.">وسيط معتمد لخدمات الألعاب والتحويلات.</p>
            <div class="actions">
                <button class="btn primary" data-ar="بيانات الدفع" data-en="Payment Info">بيانات الدفع</button>
                <button class="btn secondary" data-ar="الملف الشخصي" data-en="Profile">الملف الشخصي</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
