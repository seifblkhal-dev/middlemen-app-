<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الوسطاء الموثوقين</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <button class="nav-btn">English</button>
        <button class="nav-btn">🌓</button>
    </nav>

    <header>
        <div class="logo-container">
            <!-- رابط شعار جديد وموثوق -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/EFootball_Logo.svg/1200px-EFootball_Logo.svg.png" alt="eFootball" class="ef-logo">
        </div>
        <h1>دليل الوسطاء الموثوقين</h1>
        <p>تأكد من هوية الوسيط عبر الصور والبيانات الرسمية</p>
    </header>

    <div class="card-grid">
        <!-- كارت عبد الله -->
        <div class="card">
            <div class="profile-frame">
                <img src="abdallah.jpg" alt="Abdallah Bendal">
            </div>
            <span class="badge">وسيط موثوق</span>
            <h2>Abdallah Bendal</h2>
            <p class="desc">وسيط معتمد لخدمات الألعاب والتحويلات.</p>
            <div class="actions">
                <button class="btn primary">بيانات الدفع</button>
                <button class="btn secondary">الملف الشخصي</button>
            </div>
        </div>

        <!-- كارت فهد -->
        <div class="card">
            <div class="profile-frame">
                <img src="fahd.jpg" alt="Fahd L-y">
            </div>
            <span class="badge">وسيط موثوق</span>
            <h2>Fahd L-y</h2>
            <p class="desc">وسيط موثوق لضمان حقوق الأطراف.</p>
            <div class="actions">
                <button class="btn primary">بيانات الدفع</button>
                <button class="btn secondary">الملف الشخصي</button>
            </div>
        </div>

        <!-- كارت سيف الدين -->
        <div class="card">
            <div class="profile-frame">
                <img src="seif.jpg" alt="Seif Din Blkhal">
            </div>
            <span class="badge">وسيط موثوق</span>
            <h2>Seif Din Blkhal</h2>
            <p class="desc">مطور النظام ووسيط معتمد - ضمان وأمان.</p>
            <div class="actions">
                <button class="btn primary">بيانات الدفع</button>
                <button class="btn secondary">الملف الشخصي</button>
            </div>
        </div>
    </div>
</body>
</html>
