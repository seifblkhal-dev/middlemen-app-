<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الوسطاء الموثوقين</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00e676;
            --text-color: #ffffff;
            --secondary-text: #b0b0b0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 30px; }
        .search-bar {
            width: 100%; max-width: 500px; padding: 12px;
            border-radius: 25px; border: 1px solid #333;
            background: #252525; color: white; margin: 0 auto 20px; display: block;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 1px solid #333; transition: transform 0.3s; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .card h3 { margin: 0 0 10px; color: var(--accent-color); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg); margin: 10% auto; padding: 30px;
            width: 90%; max-width: 600px; border-radius: 20px; position: relative;
        }
        .close-btn { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 24px; }
        .info-row { margin: 15px 0; padding: 10px; border-bottom: 1px solid #333; }
        .copy-btn {
            background: var(--accent-color); color: #000; border: none;
            padding: 5px 10px; border-radius: 5px; float: left; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>الوسطاء الموثوقين 🛡️</h1>
    <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن وسيط بالاسم أو الرقم...">
</header>

<div class="grid" id="middlemenGrid"></div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalName" style="color: var(--accent-color);"></h2>
        <div id="modalDetails"></div>
    </div>
</div>

<script>
    const middlemen = [
        {
            id: 1,
            name: "الوسيط الأول",
            bio: "خبير في وساطة حسابات الألعاب الإلكترونية.",
            phone: "0550000000",
            baridimob: "00799999000123456789",
            binance: "123456789",
            status: "نشط"
        }
    ];

    function displayMiddlemen(data) {
        const grid = document.getElementById('middlemenGrid');
        grid.innerHTML = data.map(m => `
            <div class="card" onclick="openModal(${m.id})">
                <h3>${m.name} ✅</h3>
                <p>${m.bio}</p>
                <small style="color: var(--accent-color)">الحالة: ${m.status}</small>
            </div>
        `).join('');
    }

    function openModal(id) {
        const m = middlemen.find(item => item.id === id);
        document.getElementById('modalName').innerText = m.name;
        document.getElementById('modalDetails').innerHTML = `
            <div class="info-row"><strong>السيرة:</strong> <p>${m.bio}</p></div>
            <div class="info-row"><strong>الهاتف:</strong> ${m.phone} <button class="copy-btn" onclick="copyText('${m.phone}')">نسخ</button></div>
            <div class="info-row"><strong>بريدي موب:</strong> ${m.baridimob} <button class="copy-btn" onclick="copyText('${m.baridimob}')">نسخ</button></div>
            <div class="info-row"><strong>Binance ID:</strong> ${m.binance} <button class="copy-btn" onclick="copyText('${m.binance}')">نسخ</button></div>
        `;
        document.getElementById('infoModal').style.display = "block";
    }

    function closeModal() { document.getElementById('infoModal').style.display = "none"; }
    function copyText(text) { navigator.clipboard.writeText(text); alert("تم النسخ!"); }

    displayMiddlemen(middlemen);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }
</script>
</body>
</html>
